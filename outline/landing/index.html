<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henrik's Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      color: #666;
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      text-decoration: none;
      color: #e8e8e8;
      font-size: 0.95rem;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover {
      background: #222;
      border-color: #444;
    }
    .icon { font-size: 1.8rem; }
  </style>
</head>
<body>
  <h1>rexthedog.space</h1>
  <div class="grid">
    <a href="https://notes.rexthedog.space">
      <span class="icon">📝</span>
      Notes
    </a>
    <!-- Add more services below as you spin them up:
    <a href="https://grafana.rexthedog.space">
      <span class="icon">📊</span>
      Grafana
    </a>
    -->
  </div>
</body>
</html>
