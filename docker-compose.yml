services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: outline
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: outline
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set minio http://minio:9000 outline ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing minio/outline;
      exit 0;
      "

  outline:
    image: outlinewiki/outline:latest
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      URL: "https://notes.${DOMAIN}"
      PORT: "3000"
      FORCE_HTTPS: "false"

      SECRET_KEY: "${OUTLINE_SECRET_KEY}"
      UTILS_SECRET: "${OUTLINE_UTILS_SECRET}"

      DATABASE_URL: "postgres://outline:${POSTGRES_PASSWORD}@postgres:5432/outline"
      PGSSLMODE: "disable"
      REDIS_URL: "redis://redis:6379"

      FILE_STORAGE: "s3"
      AWS_ACCESS_KEY_ID: "outline"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      AWS_REGION: "us-east-1"
      AWS_S3_UPLOAD_BUCKET_NAME: "outline"
      AWS_S3_UPLOAD_BUCKET_URL: "http://minio:9000"
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: "private"

      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      OIDC_ISSUER_URL: "https://your-team.cloudflareaccess.com/cdn-cgi/access/sso/oidc/${OIDC_CLIENT_ID}"
      OIDC_DISPLAY_NAME: "Cloudflare"
      OIDC_USERNAME_CLAIM: "email"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:latest
    ports:
      - "127.0.0.1:8082:80"
    environment:
      DOMAIN: "https://vault.${DOMAIN}"
      SIGNUPS_ALLOWED: "true"
    volumes:
      - vaultwarden-data:/data
    restart: unless-stopped

  wetty:
    image: wettyoss/wetty:latest
    ports:
      - "127.0.0.1:3002:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SSHHOST: "host.docker.internal"
      SSHPORT: "22"
      SSHUSER: "admin"
    restart: unless-stopped

  filebrowser:
    image: filebrowser/filebrowser:latest
    command: --noauth
    ports:
      - "127.0.0.1:8083:80"
    volumes:
      - filebrowser-files:/srv
      - filebrowser-db:/database
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    ports:
      - "127.0.0.1:8080:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "home.${DOMAIN}"
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  brain:
    build: ./brain
    ports:
      - "127.0.0.1:8085:8000"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OUTLINE_URL: "http://outline:3000"
      OUTLINE_TOKEN: "${OUTLINE_TOKEN}"
    volumes:
      - brain-data:/app/data
    depends_on:
      - outline
    restart: unless-stopped

  recipes:
    build: ./recipes
    ports:
      - "127.0.0.1:8084:8000"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - recipes-data:/app/data
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  portainer-data:
  uptime-kuma-data:
  vaultwarden-data:
  filebrowser-files:
  filebrowser-db:
  recipes-data:
  brain-data:
