<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kanban{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* SortableJS drag states */
    .card-ghost   { opacity: .2; border: 2px dashed #6366f1 !important; background: #1e2040 !important; box-shadow: none !important; }
    .card-chosen  { box-shadow: 0 8px 24px rgba(0,0,0,.5) !important; transform: scale(1.02); }
    .card-dragging{ transform: rotate(1.5deg) scale(1.03); box-shadow: 0 16px 40px rgba(0,0,0,.6) !important; cursor: grabbing !important; }

    /* Alpine transitions – overlay */
    .overlay-enter        { transition: opacity 150ms ease-out; }
    .overlay-enter-start  { opacity: 0; }
    .overlay-enter-end    { opacity: 1; }
    .overlay-leave        { transition: opacity 120ms ease-in; }
    .overlay-leave-start  { opacity: 1; }
    .overlay-leave-end    { opacity: 0; }

    /* Alpine transitions – modal/sheet panel */
    .sheet-enter        { transition: opacity 200ms ease-out, transform 200ms ease-out; }
    .sheet-enter-start  { opacity: 0; transform: translateY(16px); }
    .sheet-enter-end    { opacity: 1; transform: translateY(0); }
    .sheet-leave        { transition: opacity 150ms ease-in, transform 150ms ease-in; }
    .sheet-leave-start  { opacity: 1; transform: translateY(0); }
    .sheet-leave-end    { opacity: 0; transform: translateY(16px); }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-[#0f1117] text-slate-200 antialiased">
  <header class="bg-[#0c0e18] border-b border-[#2d3148] sticky top-0 z-10">
    <nav class="px-4 h-14 flex items-center">
      <a href="/" class="text-[1.05rem] font-bold text-indigo-400 tracking-tight no-underline">📋 Kanban</a>
    </nav>
  </header>
  <main class="p-3 sm:p-5 flex flex-col" style="height: calc(100svh - 56px)">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
