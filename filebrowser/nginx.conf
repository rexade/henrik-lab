server {
    listen 80;

    location / {
        proxy_pass         http://filebrowser:80;
        proxy_set_header   X-Auth-User  admin;
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering    off;
    }
}
